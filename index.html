<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ============================================================
         SEO & Social Meta  (was: "Vite + React + TS" — now correct)
         ============================================================ -->
    <title>Zakaria Ait Hamou Baha — Network & IT System Specialist</title>
    <meta
      name="description"
      content="Portfolio of Zakaria Ait Hamou Baha — Network & IT System Specialist with CCNA certification based in Milano, Italy."
    />
    <meta name="author" content="Zakaria Ait Hamou Baha" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="Zakaria Ait Hamou Baha — Network & IT System Specialist"
    />
    <meta
      property="og:description"
      content="Portfolio of Zakaria Ait Hamou Baha — Network & IT System Specialist with CCNA certification based in Milano, Italy."
    />
    <meta property="og:locale" content="en_US" />

    <!-- Favicon (replace vite.svg default) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- ============================================================
         Google Fonts — loaded via <link> NOT @import in CSS.
         @import in CSS is render-blocking; <link> with preconnect
         lets the browser fetch fonts in parallel with CSS parsing.
         ============================================================ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
